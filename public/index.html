<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-grid"></div>
  </div>
  <div class="page">
    <header class="header">
      <h1 class="wordmark">MD Creator</h1>
      <p class="intro">Convert documents to Markdown. Upload a file, then copy or download the result.</p>
    </header>

    <main>
      <section id="upload-section" class="upload-section">
        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Upload file">
          <div class="drop-icon" aria-hidden="true">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect x="8" y="6" width="18" height="24" rx="2" stroke="currentColor" stroke-width="1.25"/>
              <path d="M14 14h10M14 18h10M14 22h6" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              <path d="M26 22l6 6M32 22v6h-6" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="drop-label">Drop file</p>
          <p class="drop-hint">or browse · <span id="size-limit">25 MB max</span></p>
          <input type="file" id="file-input" hidden />
        </div>

        <button type="button" class="formats-toggle" id="formats-toggle" aria-expanded="false">
          Formats
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="formats-list" id="formats-list" hidden></div>
      </section>

      <section id="loading-section" class="loading-section" hidden>
        <div class="spinner"></div>
        <p class="loading-text"><span id="loading-filename"></span></p>
      </section>

      <section id="result-section" class="result-section" hidden>
        <div class="result-bar">
          <span class="result-meta" id="result-meta"></span>
          <div class="result-actions">
            <button type="button" class="btn" id="copy-btn">Copy</button>
            <button type="button" class="btn btn-accent" id="download-btn">Download</button>
            <button type="button" class="btn btn-text" id="new-btn">New</button>
          </div>
        </div>
        <pre class="markdown-output" id="markdown-output"></pre>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
